services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tabular_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6380:6379"]
  api:
    build: .
    env_file: [.env]
    depends_on: [db, redis]
    ports: ["8000:8000"]
    volumes:
      - .:/app
      - sandbox_runs:/sandbox_runs
      - /var/run/docker.sock:/var/run/docker.sock
  worker:
    build: .
    env_file: [.env]
    depends_on: [db, redis]
    command: ["python", "-m", "app.worker"]
    volumes:
      - .:/app
      - sandbox_runs:/sandbox_runs
      - /var/run/docker.sock:/var/run/docker.sock
volumes:
  pg_data:
  sandbox_runs:
    name: tabular_agent_sandbox_runs
