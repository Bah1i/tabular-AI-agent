services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tabular_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6380:6379"]
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports: ["8081:8080"]
    volumes:
      - ./infra/keycloak/realm-tabular-agent.json:/opt/keycloak/data/import/realm-tabular-agent.json:ro
      - keycloak_data:/opt/keycloak/data
  api:
    build: .
    env_file: [.env]
    depends_on: [db, redis]
    ports: ["8000:8000"]
    volumes:
      - .:/app
      - sandbox_runs:/sandbox_runs
      - /var/run/docker.sock:/var/run/docker.sock
  worker:
    build: .
    env_file: [.env]
    depends_on: [db, redis]
    command: ["python", "-m", "app.worker"]
    volumes:
      - .:/app
      - sandbox_runs:/sandbox_runs
      - /var/run/docker.sock:/var/run/docker.sock
volumes:
  pg_data:
  keycloak_data:
  sandbox_runs:
    name: tabular_agent_sandbox_runs
